name: 🚀 Build & Release FlowDroid

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'release'
        type: choice
        options: [ debug, release ]

env:
  JAVA_VERSION: '17'

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — BUILD
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      apk_name:     ${{ steps.locate_apk.outputs.name }}
      apk_path:     ${{ steps.locate_apk.outputs.path }}
      version_name: ${{ steps.version.outputs.name }}

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      # ── Installe Gradle + génère un vrai gradlew + wrapper.jar ──────────
      #    Cela remplace le gradlew simplifié du repo qui causait l'erreur
      #    "Could not find or load main class -Xmx64m"
      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'   # doit correspondre à gradle-wrapper.properties
          cache-read-only: false

      # ── Régénère le wrapper avec la vraie version de Gradle ─────────────
      - name: 🔄 Générer Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: 🔑 Décoder Keystore
        if: github.event_name != 'pull_request'
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "⚠️ Secret KEYSTORE_BASE64 absent → fallback debug"
            echo "FALLBACK_DEBUG=true" >> $GITHUB_ENV
          else
            mkdir -p app/keystore
            printf '%s' "$KEYSTORE_B64" | base64 -d > app/keystore/release.jks
            echo "✅ Keystore décodé"
          fi

      - name: 🔖 Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # ── Build DEBUG ──────────────────────────────────────────────────────
      - name: 📦 Build Debug APK
        if: |
          github.event_name == 'pull_request' ||
          github.event.inputs.build_type == 'debug' ||
          env.FALLBACK_DEBUG == 'true'
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Build RELEASE ────────────────────────────────────────────────────
      - name: 📦 Build Release APK
        if: |
          github.event_name != 'pull_request' &&
          github.event.inputs.build_type != 'debug' &&
          env.FALLBACK_DEBUG != 'true'
        env:
          KEYSTORE_PATH:     app/keystore/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: 🔍 Localiser APK
        id: locate_apk
        run: |
          APK=$(find app/build/outputs/apk -name "*.apk" | sort | head -n 1)
          if [ -z "$APK" ]; then
            echo "❌ Aucun APK trouvé !"
            exit 1
          fi
          VERSION="${{ steps.version.outputs.name }}"
          NEW_NAME="FlowDroid-${VERSION}.apk"
          NEW_PATH="$(dirname $APK)/$NEW_NAME"
          mv "$APK" "$NEW_PATH"
          echo "path=$NEW_PATH" >> $GITHUB_OUTPUT
          echo "name=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "✅ APK: $NEW_PATH ($(du -h $NEW_PATH | cut -f1))"

      - name: 📊 Résumé build
        run: |
          SIZE=$(du -h "${{ steps.locate_apk.outputs.path }}" | cut -f1)
          echo "## 📱 FlowDroid Build" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Fichier | \`${{ steps.locate_apk.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 💾 Taille  | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔖 Version | \`${{ steps.version.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branche | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: ⬆️ Upload Artefact CI
        uses: actions/upload-artifact@v4
        with:
          name: FlowDroid-${{ steps.version.outputs.name }}-run${{ github.run_number }}
          path: ${{ steps.locate_apk.outputs.path }}
          retention-days: 30

      - name: 🏷️ Créer GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "FlowDroid ${{ github.ref_name }}"
          body: |
            ## 📱 FlowDroid ${{ github.ref_name }}

            ### 📲 Installation
            1. Téléchargez le `.apk` ci-dessous
            2. **Paramètres → Sécurité → Sources inconnues** → Activer
            3. Installez l'APK

            > ⚠️ **Requis :** Winlator (`com.winlator`) installé sur l'appareil.
          files: ${{ steps.locate_apk.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — LINT
  # ══════════════════════════════════════════════════════════════════════════
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: 🔄 Générer Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: 🧹 Lint Debug
        run: ./gradlew lintDebug --no-daemon

      - name: 📋 Upload rapport Lint
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-run${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14
